name: Update publications from SciX library

on:
  schedule:
    - cron: "0 13 * * 1" # every Monday 13:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Sync publications.html from SciX library
        env:
          ADS_API_TOKEN: ${{ secrets.ADS_API_TOKEN }}
        run: python scripts/update_publications.py

      - name: Commit changes if any
        run: |
          if git diff --quiet -- publications.html; then
            echo "No publication changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publications.html
          git commit -m "Auto-update publications from SciX library"
          git push
